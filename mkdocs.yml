site_name: Arquitetura de Software — Estudo
site_description: Estudo aprofundado de 72 conceitos intermediários e avançados de arquitetura de software, com diagramas, exemplos e referências.
site_author: Flavio Miranda
site_url: https://vinniimiranda.github.io/studies/

# O conteúdo de estudo vive nesta pasta (não em ./docs).
docs_dir: arquitetura-de-software

# Build output (ignorado pelo git).
site_dir: site

theme:
  name: material
  language: pt-BR
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Mudar para modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Mudar para modo claro
  features:
    # Navegação na barra lateral esquerda, com os 10 blocos recolhíveis
    # (sem abas horizontais no topo, que causavam scroll lateral).
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - navigation.prune
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tooltips

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang: pt

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

